<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liar's Deck — Preview</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>html,body,#root{height:100%;margin:0;background:#070d0a;}</style>
</head>
<body>
  <div id="root">
    <div style="color:#6ee7b7;font-family:sans-serif;padding:24px">Loading Liar's Deck…</div>
  </div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useCallback } = React;

    async function boot() {
      try {
        // LiarsDeck.jsx is the single source of truth, served alongside this page.
        const res = await fetch("./LiarsDeck.jsx", { cache: "no-store" });
        if (!res.ok) throw new Error("Fetch failed: HTTP " + res.status);
        let src = await res.text();

        // Strip the ES module bits so we can eval against the global React/hooks.
        src = src
          .replace(/^\s*import[^\n]*\n/gm, "")
          .replace(/export\s+default\s+function/, "function");

        const compiled = Babel.transform(src, { presets: ["react"] }).code;

        // Expose hooks + React to the compiled code, return the component.
        const factory = new Function(
          "React", "useState", "useEffect", "useRef", "useCallback",
          compiled + "\nreturn LiarsDeck;"
        );
        const LiarsDeck = factory(React, useState, useEffect, useRef, useCallback);

        ReactDOM.createRoot(document.getElementById("root"))
          .render(React.createElement(LiarsDeck));
      } catch (err) {
        document.getElementById("root").innerHTML =
          '<pre style="color:#fca5a5;font-family:monospace;padding:24px;white-space:pre-wrap">'
          + "Failed to load LiarsDeck.jsx\n\n" + (err && err.stack || err) + "</pre>";
      }
    }
    boot();
  </script>
</body>
</html>
