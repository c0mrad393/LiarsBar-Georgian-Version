<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>მატყუარას ბარი — Liar's Deck</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html, body, #root { height: 100%; margin: 0; background: #09090b; }
    body { font-family: 'Noto Sans Georgian', system-ui, sans-serif; }
  </style>
</head>
<body>
  <div id="root">
    <div style="color:#c2a15a;font-family:sans-serif;padding:24px">იტვირთება…</div>
  </div>

  <!-- Lightweight loader: no animation libraries. The component uses only React
       plus Tailwind/CSS-keyframe animations, so it pastes straight into a
       claude.ai Artifact as-is (just drop this loader). -->
  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useCallback } = React;
    async function boot() {
      try {
        const res = await fetch("./LiarsDeckPro.jsx", { cache: "no-store" });
        if (!res.ok) throw new Error("HTTP " + res.status);
        let src = await res.text();
        src = src
          .replace(/^\s*import[^\n]*\n/gm, "")
          .replace(/export\s+default\s+function/, "function");
        const compiled = Babel.transform(src, { presets: ["react"] }).code;
        const factory = new Function(
          "React", "useState", "useEffect", "useRef", "useCallback",
          compiled + "\nreturn LiarsDeckPro;"
        );
        const Comp = factory(React, useState, useEffect, useRef, useCallback);
        ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(Comp));
      } catch (err) {
        document.getElementById("root").innerHTML =
          '<pre style="color:#fca5a5;font-family:monospace;padding:24px;white-space:pre-wrap">'
          + "Failed to load LiarsDeckPro.jsx\n\n" + (err && err.stack || err) + "</pre>";
      }
    }
    boot();
  </script>
</body>
</html>
